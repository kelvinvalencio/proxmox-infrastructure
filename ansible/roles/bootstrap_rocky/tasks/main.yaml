---
- name: Assert supported OS
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Rocky"
      - ansible_distribution_major_version == "9"
    fail_msg: >
      This role only supports Rocky Linux 9.
      Detected: {{ ansible_distribution }} {{ ansible_distribution_version }}
    success_msg: "OS check passed — Rocky Linux 9 confirmed."

- ansible.builtin.import_tasks: packages.yaml
- ansible.builtin.import_tasks: selinux.yaml
- ansible.builtin.import_tasks: system.yaml
- ansible.builtin.import_tasks: sshd.yaml
- ansible.builtin.import_tasks: docker.yaml
