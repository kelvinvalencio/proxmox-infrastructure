---
- name: set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: update /etc/hosts to prevent sudo resolution delays
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present
