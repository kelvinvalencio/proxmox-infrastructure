---
- name: disable PVE enterprise repo (legacy format)
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    regexp: '^(deb .*)'
    replace: '# \1'
  failed_when: false

- name: disable PVE enterprise repo (DEB822 format)
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    insertafter: '^Types: deb'
    line: 'Enabled: no'
    state: present
  failed_when: false

- name: restore URIs line in ceph.sources if previously mishandled
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/ceph.sources
    regexp: '^# (URIs:.*)'
    replace: '\1'
  failed_when: false

- name: disable enterprise Ceph repo (DEB822 format)
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/ceph.sources
    insertafter: '^Types: deb'
    line: 'Enabled: no'
    state: present
  failed_when: false

- name: configure apt sources.list
  ansible.builtin.template:
    src: sources.list.j2
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'

- name: update apt cache
  ansible.builtin.apt:
    update_cache: true
